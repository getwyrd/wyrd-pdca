# pdca.toml — driver configuration for Wyrd PDCA.
# Read by pdca_harness.config; the only project-specific runtime config.

[project]
name = "Wyrd PDCA"
default_branch = "main"
# Default §9 sign-off attribution, so `flow`/`signoff` never need a --by. Override
# per-run with --by.
author = "Eduard Ralph"

[paths]
bundle_root = "results"
process_dir = "process"
templates_dir = "templates"

# In-driver lane concurrency (docs 09 §parallel lanes). `lanes` is the worker-pool
# size for the UNATTENDED Do+Check band only — Plan, sign-off, publish, and Act stay
# serial. 1 (the default) is the strictly-serial driver. Override for a single run
# with `PDCA_LANES=N` or `--lanes N` on `pdca flow`.
#
# A pool > 1 runs N bundles concurrently in ONE workspace. Each worker is pinned to a
# fixed lane slot 0..N-1 and exposes it to every gate command as `$PDCA_LANE`. A gate
# that backs onto a shared mutable resource (a target checkout it applies/reverts, a
# container, a port, a scratch dir) MUST name that resource by `$PDCA_LANE` so two
# lanes can't collide — e.g. `--name app-l$PDCA_LANE`, a `repo-lane$PDCA_LANE`
# checkout. Bundles in the same lane reuse that lane's resources serially, so you need
# only N copies, not one per bundle. Leave at 1 unless per-lane disk / sign-off
# ergonomics actually bite (then prefer this over N separate workspaces).
[driver]
lanes = 1
# Worktree isolation (issue #94). A cycle's Do/Check run in a dedicated git worktree off
# the target's base, so the host's primary checkout is NEVER mutated in place. The harness
# creates/resets it per cycle (per lane slot) and exposes its path as `$PDCA_WORKTREE` —
# the builder edits there (granted access automatically), and gate commands should target
# `$PDCA_WORKTREE` too (see the gate examples below). On by default; best-effort (a target
# that isn't a worktree-capable git checkout falls back to in-place). Set false to disable.
worktree = true
# Act cadence (issue #109). Act is a cross-cycle beat that yields a real delta only once
# enough cycles have frozen to show a pattern, so `pdca flow` auto-runs it only when this
# many cycles have frozen SINCE the last Act review — counted across flow invocations
# (five one-bundle flows trip it on the fifth), not per-run. Below the threshold the flow
# skips Act with a hint; `pdca act log` runs it on demand and `--no-act` always skips.
# Set to 1 to run Act after every completed flow (the prior behaviour).
act_cadence = 5
# Close-disposition fast path (issue #60). A bundle whose brief's `Disposition hint`
# matches one of these close / no-fix classes skips the builder + reviewer model leaves
# (the engine's only token spend) and routes straight to sign-off, where the human
# confirms or overrides the close. It is a HINT, not a gate: reopening to a fix path
# (iterate-to-Do) re-enables the full Do+Check band. Substring-matched, case-insensitive,
# against the disposition value. Retune this list to your tracker's vocabulary; omit it
# to use the built-in default shown here.
# close_dispositions = ["likely-close", "wontfix", "by-design", "duplicate", "not-reproducible", "manual-verification", "upstream", "external"]

[tracker]
system = "github"
url = "https://github.com/getwyrd/wyrd"
issue_id_example = "#123"
# Trailer linking a commit/PR to the issue ({id} = the bug id). Trackers differ
# (GitHub/Mantis "Fixes #{id}", Jira "Fixes PROJ-{id}"); "" enforces none. The
# publish step's commit-msg ends with this; the T4 gate (if any) checks it.
# No tracker id yet? Use `pdca publish --no-issue`: it omits the trailer, relaxes
# T4 to a flag, and records the bundle `id_pending` (no magic "#0000" placeholder).
issue_trailer = "Fixes #{id}"
# Optional default tracker export the Plan leaf reads the issue row from when `flow`
# runs without --from-csv (it reads ONLY that issue's row, not a repo scan):
# export_csv = "path/to/export.csv"
# Optional tracker-scrape command run before a Plan beat to seed a bundle's
# issue_<id>/notes.json (the planner reads it for the full comment thread) — so a
# seeded id list briefs end-to-end without scraping by hand (issue #65). It is a
# `.format(id=)` shell template; $PDCA_BUNDLE is the bundle dir, and the command MUST
# write notes.json there itself. Skipped when notes.json already exists; a failure is
# non-fatal (Plan falls back to the CSV / asking the human). "" / unset → no fetch.
# Wyrd's tracker is GitHub Issues, so the planner's source is the live ticket scraped via
# `gh` (engine/scripts/scrape-notes.sh) — the render's concretization of this seam.
notes_cmd = "./engine/scripts/scrape-notes.sh {id}"

# Composable Plan-seeding sources (issue #102) — a brief often draws on MORE than the
# ticket (a linked proposal / ADR / spec, a CSV row). Declare one or more providers as
# [[plan.source]]; each contributes context into the bundle's `sources/` dir before the
# Plan beat, and the planner briefs from ALL of them. Each is best-effort (a missing tool
# / file / failing command is non-fatal). Built-in types: github (gh), gitlab (glab), csv,
# file (a path/glob, {id} interpolated), command (the escape hatch — a `.format(id=)` shell
# command run with $PDCA_BUNDLE / $PDCA_SOURCES set; it writes its own output). The legacy
# notes_cmd above still runs, so this is purely additive. Examples (uncomment to use):
# [[plan.source]]
# type = "github"            # gh issue view {id} --json … → sources/github-<id>.json
# # repo = "owner/repo"      # optional; omit to use gh's default repo
# [[plan.source]]
# type = "file"              # a linked design doc / ADR / proposal / spec
# path = "docs/adr/*{id}*.md"
# [[plan.source]]
# type = "csv"
# path = "path/to/export.csv"
# key = "id"                 # the id column header; omit to copy the whole export
# [[plan.source]]
# type = "command"           # exactly today's notes_cmd, but one of several sources
# cmd = "./engine/scripts/scrape-notes.sh {id}"

# Publish mechanics — `pdca publish` and the flow's publish-on-accept (docs 03 §Check
# closing step). Branch patterns are `{id}` / `{slug}` format strings; the
# repo→checkout map falls back to the sibling convention (`<project>/../<repo-last-
# segment>`) when a repo_spec is unmapped, so most setups need no entries.
[publisher]
fix_branch_pattern = "fix/{id}-{slug}"
feature_branch_pattern = "enhancement/{id}-{slug}"
# The remote the new-PR path branches the fix off of (issue #83). A fork branches off
# `upstream` (canonical) and pushes to `origin` (the fork); an own-repo target has only
# `origin`. Defaulted from contribution_model; change it if your remotes differ.
base_remote = "origin"

[publisher.checkouts]
# "<org/repo>" = "../<checkout-dir>"   # only the exceptions to the sibling default
# No override needed: the target resolves to the sibling-default `../wyrd`. Cycle
# isolation is now NATIVE (eduralph/pdca-harness#94, v0.30.0) — the driver runs a cycle's
# Do/Check in a per-cycle git worktree off the target's base ($PDCA_WORKTREE) and never
# touches the human's checkout, so the old dedicated `../wyrd-cycle` mapping is obsolete.

# The six model leaves (docs 03 §Implementation substrate). mode = "stub" runs
# the offline placeholders (no model/TTY) so the driver works without a model;
# mode = "command" runs `argv` as a subprocess with the leaf's prompt. `interactive
# = true` hands the terminal to the human (a seeded `claude "<prompt>"` REPL, no
# -p); a headless leaf runs autonomously (`claude -p …`) and writes its artifact.
# Set PDCA_LEAVES_MODE=stub to force stubs everywhere (CI / `make` determinism).
#
# Headless leaves ----------------------------------------------------------------
# Do builder — writes patch.diff + test + build-notes.md:
[leaves.builder]
mode = "command"
family = "claude"
interactive = false
# Headless. Runs from THIS project root. With worktree isolation on ([driver].worktree,
# #94) the driver runs Do in a per-cycle git worktree off the target's base, exports it as
# $PDCA_WORKTREE, and appends `--add-dir $PDCA_WORKTREE` for the claude family — so the
# builder implements + tests the fix THERE (never the human's checkout) and captures
# patch.diff. No hardcoded target path here.
argv = ["claude", "-p", "--agent", "builder", "--permission-mode", "acceptEdits", "--allowedTools", "Read,Edit,Write,Bash,Grep,Glob"]

# Check reviewer (advisory; build-notes withheld via a sandbox). Cross-vendor
# decorrelation is the IDEAL — a DIFFERENT family from the builder (INTEGRATION §4) —
# but `codex` is not installed here, so this is the documented SAME-VENDOR FALLBACK
# (`--agent reviewer`, read-only in its sandbox). Install codex and restore
# `family = "codex"` + `argv = ["codex", "exec", "--config", "AGENTS.md"]` to regain it.
[leaves.reviewer]
mode = "command"
family = "claude"
interactive = false
# READ grounding on the target tree is provided by the driver (#75, v0.26.0): it
# resolves the brief's "Repo + branch target" to the local checkout (the sibling-default
# `../wyrd`, or a `[publisher.checkouts]` override), exports `$PDCA_TARGET`,
# and appends `--add-dir <target>` for the
# claude family — so the reviewer verifies every cited `path:line` against the real
# target with no hardcoded path here. If the target can't be resolved it grounds against
# patch.diff alone and never wanders to other checkouts. Stays read-only on Wyrd: no
# `Edit` in --allowedTools, and it writes only its check-review.md into the bundle.
argv = ["claude", "-p", "--agent", "reviewer", "--permission-mode", "acceptEdits", "--allowedTools", "Read,Write,Grep,Glob"]

# Interactive leaves — the human-in-the-loop touch points (Plan, Sign-off, Publish,
# Act) hand the terminal to a seeded Claude REPL. The driver grants those that read/cite
# or contribute against the Wyrd checkout access to it ($PDCA_TARGET / the per-cycle
# $PDCA_WORKTREE); act touches only this project.
[leaves.planner]
mode = "command"
family = "claude"
interactive = true
argv = ["claude", "--agent", "planner", "--permission-mode", "acceptEdits"]

[leaves.signoff]
mode = "command"
family = "claude"
interactive = true
argv = ["claude", "--agent", "signoff", "--permission-mode", "acceptEdits"]

[leaves.act]
mode = "command"
family = "claude"
interactive = true
argv = ["claude", "--agent", "act", "--permission-mode", "acceptEdits"]

# Publisher — Check's closing step: writes commit-msg.txt + pr-description.md (the
# git/draft-PR mechanics are deterministic code in pdca_harness.publish).
[leaves.publisher]
mode = "command"
family = "claude"
interactive = true
argv = ["claude", "--agent", "publisher", "--permission-mode", "acceptEdits"]

# Optional advisory reviewer leaves (issue #64) — an OPEN list. The `reviewer` leaf above
# judges fix ADEQUACY (causal adequacy, scope, validation); add role-distinct ADVISORY
# reviewers here for other lenses (e.g. correctness bugs the patch introduces + reuse /
# simplification / efficiency cleanups). Each writes check-advisory-<id>.md; its
# `- NEEDS-HUMAN —` findings route into SUMMARY §6. Always advisory — never gates.
# Decorrelate: prefer a `family` distinct from the builder AND the reviewer where you can.
# `when = { field = "<brief field>", substring = "<v>" }` runs it only when that brief
# field matches (e.g. a "Review depth" field an Act rule tunes) — omit to always run.
# [[leaves.advisory]]
# id = "code-review"
# role = "correctness bugs introduced by the patch + reuse/simplification/efficiency cleanups"
# mode = "stub"
# family = "claude"
# argv = ["claude", "-p", "--agent", "code-review", "--permission-mode", "acceptEdits", "--allowedTools", "Read,Bash,Grep,Glob"]
# when = { field = "review depth", substring = "deep" }
# Deterministic Check gates (docs 04). Each check runs a shell command; it PASSES
# iff the command exits 0. `scope = "repo"` runs against the working tree (and is
# what CI re-runs via `pdca gates --working-tree`); `scope = "bundle"` needs the
# bundle/patch context ($PDCA_BUNDLE is exported) and runs only locally. The
# SAME commands run for the local driver and CI — single-sourced, no drift.
# With worktree isolation on ([driver].worktree), $PDCA_WORKTREE is also exported —
# the isolated tree Do edited; a bundle-scoped gate should test THAT, not the host
# checkout (e.g. `cd "$PDCA_WORKTREE" && <run the test>`).
#
# TARGET-AWARE SELECTION (optional). A check may carry `target` — a label or a LIST;
# it runs iff its labels are a SUBSET of the bundle's label set (subset = AND). The
# bundle is classified from its brief on two axes:
#   * PRIMARY (mutually exclusive, e.g. core vs addon): `[gates.target_match]` maps a
#     label → substring matched (case-insensitively) against "Repo + branch target",
#     `target_default` is used when none match.
#   * FLAGS (additive, e.g. frontend): `[gates.target_flags]` maps a label →
#     {field, substring} matched against ANY brief field (a bare string ⇒ the
#     "Repo + branch target" field).
# Unset ⇒ no filtering (every gate runs). E.g. skip core suites on an addon-only fix,
# and run a GUI/E2E gate only for a *frontend* change (core OR addon):
#   [gates]
#   target_default = "core"
#   [gates.target_match]
#   addon = "addons-source"
#   [gates.target_flags]
#   frontend = { field = "surfaces", substring = "gui" }
# then tag gates: core suite `target = "core"`, addon suite `target = "addon"`, GUI
# smoke `target = "frontend"`, an addon-in-GUI E2E `target = ["addon", "frontend"]`.
# `pdca gates --working-tree` (no bundle) is never filtered, so the CI re-gate is unaffected.
#
# While `checks` is empty the driver uses built-in all-PASS stubs so the offline
# slice runs. Fill these in as your gate tiers get written (gates are the long
# pole — build them first). Gate commands live in your project's verification
# engine under `engine/` (see engine/README.md). Example:
#
# C4 — the per-fix CORRECTNESS gate (bundle-scoped, GATING). Applies the bundle's
# patch.diff and runs ONLY its test, asserting red-without-fix / green-with-fix.
# This is what makes a cycle mean something — it validates THIS change.
# [[gates.checks]]
# id = "C4-verify"
# tier = "C4"
# label = "fix verified: test red pre-fix, green post-fix"
# cmd = "./engine/scripts/run-verify.sh"
# gating = true
# scope = "bundle"
#
# T3 — a whole-suite runtime gate on the UNMODIFIED tree. Ship it ADVISORY
# (gating = false): a checkout with any pre-existing failure is red as a baseline
# and never sees the bundle's patch, so it cannot gate a single fix — C4-verify
# above is the per-fix gate. Re-gate once the suite is green-baseline.
# [[gates.checks]]
# id = "T3-suite"
# tier = "T3"
# label = "runtime: whole test suite (baseline)"
# cmd = "./engine/scripts/run-suite.sh"
# gating = false
# scope = "repo"
#
# GATING POLICY (learned the hard way): default a tier to ADVISORY (gating =
# false). The per-fix C4 (red→green) is the one gate that ships gating = true —
# runtime, conformance (T1/T2/T4), and interface/E2E tiers all audit code the
# *current* fix did not introduce, so gating them on pre-existing/legacy
# non-conformance is wrong. Promote a tier to gating once its targeted artifacts
# are clean. For interface/E2E, gate a SMOKE test ("does the app start"), not the
# full suite — the full suite mixes green tests with known-bug repros, so it is a
# characterization, not a pass/fail signal. Cite each tier's rules back to the
# project's normative ruleset (docs/INTEGRATION.md §4) so the gate is auditable.
#
# DELEGATED GATES (issue #67). If your project already single-sources its gates in its
# own runner, point `runner` at it and give each check a bare `subcmd` instead of a full
# `cmd`; PDCA runs `<runner> <subcmd>` and treats the host runner as the source of truth
# (it never re-declares the gates). A missing runner surfaces as a clear failing row, not
# a crash. A full `cmd` (e.g. `cmd = "cargo xtask ci"`) still works for wholesale delegation.
[gates]

# Delegated to Wyrd's single-sourced runner — PDCA orchestrates it, Wyrd owns every gate
# definition (ADR-0016: gates live once, in `cargo xtask`, never re-declared here).
# `runner` is the engine/xtask.sh wrapper, which cd's into the sibling Wyrd checkout and
# execs `cargo xtask <subcmd>` (gates run from THIS project's root, but cargo xtask must
# run in the Wyrd repo). A `./`-prefixed runner is honored verbatim (no PATH probe).
runner = "./engine/xtask.sh"
checks = [
  # The whole Wyrd gate, wholesale. `cargo xtask ci` = fmt + clippy -D warnings + build +
  # test (incl. DST) + cargo-deny + conformance vectors, run identically on laptop and CI.
  # It is the single source of gate truth, so it is the one gating check (scope=repo:
  # what `pdca gates --working-tree` re-runs). It is the whole-tree gate; the per-fix
  # red->green discriminator that validates THIS change is C4-verify below.
  { id = "C4-ci", tier = "C4", label = "Wyrd gate: cargo xtask ci (fmt/clippy/build/test/deny/conformance)", subcmd = "ci", gating = true, scope = "repo" },

  # Per-fix red->green — the C4 that validates THIS change, not the whole tree. Applies
  # the bundle's patch.diff in an isolated ../wyrd-verify worktree (off main) and runs
  # ONLY the test it ships: GREEN with the fix, RED with the production reverted (the
  # added test kept). A co-located test (no separate */tests/*.rs) degrades to green-only.
  # A full `cmd` (not a `cargo xtask` subcmd); scope=bundle so $PDCA_BUNDLE is exported.
  # ADVISORY first (gating=false) until it has run clean across a few cycles; promote to
  # gating then (engine/README.md). Logic unit-tested by engine/tests/test_run_verify.sh.
  { id = "C4-verify", tier = "C4", label = "per-fix red->green: this patch's test red pre-fix, green post-fix", cmd = "./engine/scripts/run-verify.sh", gating = false, scope = "bundle" },

  # OPTIONAL finer-grained, read-only rows for per-tier reporting. Commented out because
  # `ci` already runs both internally — enabling them re-runs work (dst sweeps 50 seeds).
  # Uncomment if you want the tiers to show as separate evidence lines rather than rolled
  # into C4-ci; they remain pure `cargo xtask` delegations (no re-declaration):
  # { id = "T1-conformance", tier = "T1", label = "on-disk format conformance vectors (ADR-0002)", subcmd = "conformance", gating = false, scope = "repo" },
  # { id = "T3-dst",         tier = "T3", label = "deterministic simulation sweep (ADR-0009)",     subcmd = "dst",         gating = false, scope = "repo" },
]


